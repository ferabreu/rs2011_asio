[Config]
; for "EnableWasapiOutputs" you can use -1 to have a message prompting
; to use either WASAPI or ASIO for output every time you boot the game
EnableWasapiOutputs=0
; WASAPI input is required for Rocksmith 2011 to detect the Real Tone Cable.
; RS2011 identifies its guitar input by WASAPI device path, not by ASIO enumeration.
; Set EnableWasapiInputs=1 to allow RS-ASIO to intercept the cable's WASAPI activation
; and redirect it to the ASIO input configured below.
EnableWasapiInputs=1
EnableAsio=1

[Asio]
; available buffer size modes:
; driver - respect buffer size setting set in the driver
; host   - use a buffer size as close as possible as that requested by the host application
; custom - use the buffer size specified in CustomBufferSize field
BufferSizeMode=driver
CustomBufferSize=

; if your game hangs or crashes on exit, try setting "EnableRefCountHack" to true.
; when blank or invalid, the value of "EnableRefCountHack" will be interpreted as
; true if RS ASIO detects the usage of Asio4All.
; the same applies for all inputs.
; 
; driver set to "wineasio-rsasio", for running Rocksmith 2011 in Linux/Steam/Proton
[Asio.Output]
Driver=wineasio-rsasio
BaseChannel=0
AltBaseChannel=
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=

[Asio.Input.0]
Driver=wineasio-rsasio
Channel=0
; WasapiDevice: Redirect a WASAPI capture device to this ASIO input.
; RS2011 selects its guitar input by WASAPI device path. When the game tries to open the
; Real Tone Cable, RS-ASIO intercepts and routes audio through ASIO instead.
; Matched case-insensitively against the device ID (GUID) or friendly name.
; The value below matches all Real Tone Cable variants on Wine/Proton.
; To find the right value for other devices, check RS_ASIO.log for "friendly name:" lines.
WasapiDevice=Rocksmith
; FriendlyName: Override the device name reported to the game during enumeration.
; This does NOT affect which device RS2011 selects for input (it uses WASAPI device path).
; Useful for RS2014 or other games that select by friendly name.
FriendlyName=
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=

[Asio.Input.1]
Driver=wineasio-rsasio
Channel=1
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=

[Asio.Input.Mic]
Driver=wineasio-rsasio
Channel=1
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=