[Config]
; for "EnableWasapiOutputs" you can use -1 to have a message prompting
; to use either WASAPI or ASIO for output every time you boot the game
EnableWasapiOutputs=0
; WASAPI input is only needed as a fallback for Rocksmith 2011 if the FriendlyName= approach below
; doesn't work on your system. Leave at 0 if using FriendlyName= (cable-free mode).
EnableWasapiInputs=0
EnableAsio=1

[Asio]
; available buffer size modes:
; driver - respect buffer size setting set in the driver
; host   - use a buffer size as close as possible as that requested by the host application
; custom - use the buffer size specified in CustomBufferSize field
BufferSizeMode=driver
CustomBufferSize=

; if your game hangs or crashes on exit, try setting "EnableRefCountHack" to true.
; when blank or invalid, the value of "EnableRefCountHack" will be interpreted as
; true if RS ASIO detects the usage of Asio4All.
; the same applies for all inputs.
; 
; driver set to "wineasio-rsasio", for running Rocksmith 2011 in Linux/Steam/Proton
[Asio.Output]
Driver=wineasio-rsasio
BaseChannel=0
AltBaseChannel=
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=

[Asio.Input.0]
Driver=wineasio-rsasio
Channel=0
; FriendlyName: Make this ASIO input appear to the game as if it were the Real Tone Cable.
; Rocksmith 2011 selects its guitar input by device name - setting this makes it find and use
; this ASIO input directly, without needing a physical Real Tone Cable connected.
; The value below matches the name reported by the Real Tone Cable on Wine/Proton.
FriendlyName=Rocksmith Guitar Adapter Mono
; WasapiDevice: Fallback approach - redirect a WASAPI capture device to this ASIO input.
; Use this if FriendlyName= alone doesn't work. Set EnableWasapiInputs=1 above when using this.
; Matched case-insensitively against device ID (GUID) or friendly name.
; To find the right value, check RS_ASIO.log for "friendly name:" lines.
; Example: WasapiDevice=Rocksmith
WasapiDevice=
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=

[Asio.Input.1]
Driver=wineasio-rsasio
Channel=1
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=

[Asio.Input.Mic]
Driver=wineasio-rsasio
Channel=1
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=