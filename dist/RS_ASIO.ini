[Config]
; for "EnableWasapiOutputs" you can use -1 to have a message prompting
; to use either WASAPI or ASIO for output every time you boot the game
EnableWasapiOutputs=0
; Required for Rocksmith 2011 (set to 1 if using WasapiDevice= redirect with a physical cable;
; set to 0 for cable-free mode using WasapiId= below)
EnableWasapiInputs=0
EnableAsio=1

[Asio]
; available buffer size modes:
; driver - respect buffer size setting set in the driver
; host   - use a buffer size as close as possible as that requested by the host application
; custom - use the buffer size specified in CustomBufferSize field
BufferSizeMode=driver
CustomBufferSize=

; if your game hangs or crashes on exit, try setting "EnableRefCountHack" to true.
; when blank or invalid, the value of "EnableRefCountHack" will be interpreted as
; true if RS ASIO detects the usage of Asio4All.
; the same applies for all inputs.
[Asio.Output]
Driver=wineasio-rsasio
BaseChannel=0
AltBaseChannel=
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=

[Asio.Input.0]
Driver=wineasio-rsasio
Channel=0
; Cable-free mode for RS2011: set WasapiId to the Real Tone Cable's WASAPI endpoint ID, and
; WasapiDevice to its full friendly name. Both come from the {0.0.1.00000000}.{GUID} and
; "friendly name:" lines in RS_ASIO.log (run once with the cable connected to discover them).
; When WasapiId= is set, EnableWasapiInputs must be 0 (cable not required after that).
WasapiId={0.0.1.00000000}.{21D5646C-D708-4E90-A57A-E1956015D4F3}
WasapiDevice=Rocksmith Guitar Adapter Mono
; Alternative: cable-based redirect (requires EnableWasapiInputs=1 and physical cable connected).
; WasapiDevice is then a case-insensitive substring matched against device IDs and friendly names.
; The value "Rocksmith" matches all Real Tone Cable variants on Wine/Proton.
;WasapiId=
;WasapiDevice=Rocksmith
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=

[Asio.Input.1]
Driver=wineasio-rsasio
Channel=1
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=

[Asio.Input.Mic]
Driver=wineasio-rsasio
Channel=1
EnableSoftwareEndpointVolumeControl=1
EnableSoftwareMasterVolumeControl=1
SoftwareMasterVolumePercent=100
EnableRefCountHack=